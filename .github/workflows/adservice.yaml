name: adservice CI

run-name: "adservice — ${{ github.event.head_commit.message || github.event.pull_request.title }} (${{ github.sha }})"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - '.github/workflows/adservice.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - '.github/workflows/adservice.yaml'

permissions:
  contents: write
  packages: write


jobs:

  sonar-and-snyk:
    if: github.event_name == 'pull_request'
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/sonar-and-snyk.yaml@feature/loose-coupling
    with:
      service_name: adservice
      service_path: src/
      runtime: java
      java-version: "21"
      java-build-tool: "gradle"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  generate-tag-and-build-image:
    needs: [sonar-and-snyk]
    if: |
      always() &&
      (
        (github.event_name == 'pull_request' && needs.sonar-and-snyk.result == 'success') ||
        github.event_name == 'push'
      )
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/generate-tag-and-build-image-trivy.yaml@feature/loose-coupling
    with:
      service_name: adservice
      service_path: src/
      run_trivy: ${{ github.event_name == 'pull_request' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  push:
    needs: [generate-tag-and-build-image]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.generate-tag-and-build-image.result == 'success'
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/push.yaml@feature/loose-coupling
    with:
      service_name: adservice
      git_tag: ${{ needs.generate-tag-and-build-image.outputs.tag }}
      tag_exists: ${{ needs.generate-tag-and-build-image.outputs.tag_exists }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  push-to-ghcr:
    needs: [push, generate-tag-and-build-image]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      needs.push.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      push_result: ${{ steps.push.outcome }}
    steps:
      - name: Login to DockerHub (pull source image)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR (push destination)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull from DockerHub, re-tag, push to GHCR
        id: push
        run: |
          TAG=${{ needs.generate-tag-and-build-image.outputs.tag }}
          SRC="yampss/hipstershop-adservice:${TAG}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          DST="ghcr.io/${OWNER}/hipstershop-adservice:${TAG}"
          docker pull ${SRC}
          docker tag  ${SRC} ${DST}
          docker push ${DST}
          echo "Pushed ${DST}"


  update-helm-values-dev:
    needs: [push, generate-tag-and-build-image]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      github.ref_name == 'develop' &&
      needs.push.result == 'success'
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/helm-updater-job.yaml@feature/loose-coupling
    with:
      service_name: adservice
      image_tag: ${{ needs.generate-tag-and-build-image.outputs.tag }}
      helm_values_path: "hipstershop-micro-apps/adservice/values.dev.yaml"
      target_branch: "develop"
    secrets:
      HELM_CHARTS_TOKEN: ${{ secrets.HELM_CHARTS_TOKEN }}

  prod-approval-gate:
    needs: [push-to-ghcr, generate-tag-and-build-image]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      github.ref_name == 'main' &&
      needs.push-to-ghcr.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approved — proceeding to update Helm chart for Production (GHCR image)
        run: echo "Production deployment approved for tag ${{ needs.generate-tag-and-build-image.outputs.tag }}"

  update-helm-values-prod:
    needs: [prod-approval-gate, generate-tag-and-build-image]
    if: |
      always() &&
      needs.prod-approval-gate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts repo
        uses: actions/checkout@v4
        with:
          repository: HipsterShopp/hipstershop-helm-charts
          ref: main
          token: ${{ secrets.HELM_CHARTS_TOKEN }}

      - name: Update adservice image tag in values.prod.yaml (ghcr.io)
        run: |
          TAG=${{ needs.generate-tag-and-build-image.outputs.tag }}
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # Use [^/]* to match ANY existing org name — prevents silent no-op
          # if the org name in the file ever differs from the computed OWNER.
          sed -i "s|ghcr.io/[^/]*/hipstershop-adservice:[^\"]*|ghcr.io/${OWNER}/hipstershop-adservice:${TAG}|g" \
            hipstershop-micro-apps/adservice/values.prod.yaml
          echo "Updated values.prod.yaml to ghcr.io/${OWNER}/hipstershop-adservice:${TAG}"
          # Verify the update actually landed
          grep "adservice:" hipstershop-micro-apps/adservice/values.prod.yaml

      - name: Commit and push updated values.prod.yaml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions<41898282+github-actions[bot]@users.noreply.github.com>"
          git add hipstershop-micro-apps/adservice/values.prod.yaml
          git diff --cached --quiet || git commit -m "chore(adservice): update prod image tag to ${{ needs.generate-tag-and-build-image.outputs.tag }} (ghcr.io)"
          git push

  notify:
    needs: [sonar-and-snyk, generate-tag-and-build-image, push, update-helm-values-dev, update-helm-values-prod]
    if: always()
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/notify.yaml@feature/loose-coupling
    with:
      service_name: adservice
      git_tag: ${{ needs.generate-tag-and-build-image.outputs.tag || 'N/A' }}
      sonarqube_result: ${{ needs.sonar-and-snyk.outputs.sonarqube_result || 'skipped' }}
      snyk_result: ${{ needs.sonar-and-snyk.outputs.snyk_result || 'skipped' }}
      generate_tag_result: ${{ needs.generate-tag-and-build-image.result || 'skipped' }}
      build_result: ${{ needs.generate-tag-and-build-image.outputs.build_result || 'skipped' }}
      trivy_result: ${{ needs.generate-tag-and-build-image.outputs.trivy_result || 'skipped' }}
      push_result: ${{ needs.push.outputs.push_result || 'skipped' }}
    secrets:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
