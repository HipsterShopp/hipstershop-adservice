name: adservice CI

run-name: "adservice — ${{ github.event.head_commit.message || github.event.pull_request.title }} (${{ github.sha }})"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - '.github/workflows/adservice.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - '.github/workflows/adservice.yaml'

permissions:
  contents: write


jobs:

  # ── STEP 1: PR only — code quality gate ──────────────────────────────
  sonar-and-snyk:
    if: github.event_name == 'pull_request'
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/sonar-and-snyk.yaml@feature/loose-coupling
    with:
      service_name: adservice
      service_path: src/
      runtime: java
      java-version: "21"
      java-build-tool: "gradle"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}


  # ── STEP 2: Generate tag + build + trivy (PR) / skip trivy (push) ────
  #
  #    WHY always()? On push, sonar-and-snyk is skipped. Without always(),
  #    GitHub auto-skips any job that needs a skipped job. always() opts
  #    out of that behaviour so we can write our own condition below.
  #
  #    run_trivy evaluates to true on PR, false on push — no duplicate job needed.
  generate-tag-and-build-image:
    needs: [sonar-and-snyk]
    if: |
      always() &&
      (
        (github.event_name == 'pull_request' && needs.sonar-and-snyk.result == 'success') ||
        github.event_name == 'push'
      )
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/generate-tag-and-build-image-trivy.yaml@feature/loose-coupling
    with:
      service_name: adservice
      service_path: src/
      run_trivy: ${{ github.event_name == 'pull_request' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}


  # ── STEP 3: Push to Docker Hub (push/merge only, no push on PR) ──────
  push:
    needs: [generate-tag-and-build-image]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.generate-tag-and-build-image.result == 'success'
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/push.yaml@feature/loose-coupling
    with:
      service_name: adservice
      git_tag: ${{ needs.generate-tag-and-build-image.outputs.tag }}
      tag_exists: ${{ needs.generate-tag-and-build-image.outputs.tag_exists }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}


  # ── STEP 4: Notify on any failure ────────────────────────────────────
  notify:
    needs: [sonar-and-snyk, generate-tag-and-build-image, push]
    if: always()
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/notify.yaml@feature/loose-coupling
    with:
      service_name: adservice
      git_tag: ${{ needs.generate-tag-and-build-image.outputs.tag || 'N/A' }}
      sonarqube_result: ${{ needs.sonar-and-snyk.outputs.sonarqube_result || 'skipped' }}
      snyk_result: ${{ needs.sonar-and-snyk.outputs.snyk_result || 'skipped' }}
      generate_tag_result: ${{ needs.generate-tag-and-build-image.result || 'skipped' }}
      build_result: ${{ needs.generate-tag-and-build-image.outputs.build_result || 'skipped' }}
      trivy_result: ${{ needs.generate-tag-and-build-image.outputs.trivy_result || 'skipped' }}
      push_result: ${{ needs.push.outputs.push_result || 'skipped' }}
    secrets:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}