name: Self Hosted Build + Trivy Test

on:
  workflow_dispatch:

env:
  SERVICE_NAME: adservice
  IMAGE_NAME: hipstershop-adservice
  IMAGE_TAG: test-${{ github.run_number }}

jobs:
  build-and-scan:
    name: Build Docker Image + Trivy Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Runner Info
        run: |
          echo "Runner: $RUNNER_NAME"
          hostname
          whoami

      - name: Docker Version
        run: |
          docker --version
          docker ps

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG ./src

      - name: Verify Built Image
        run: docker images | grep $IMAGE_NAME

      - name: Save Docker Image Artifact
        run: docker save $IMAGE_NAME:$IMAGE_TAG -o /tmp/image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ env.SERVICE_NAME }}
          path: /tmp/image.tar
          retention-days: 1

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Success
        run: echo "Build + Trivy completed successfully"
