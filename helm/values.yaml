
# ── adservice — self-contained Helm values ──────────────────
# Templates use flat .Values.* (no global.* prefix).
# CI updates image.tag on every successful build via yq.

image:
  repository: cazzzzz/hipstershop-adservice
  tag: latest        # overwritten by CI: yq e '.image.tag = "..."' -i helm/values.yaml

namespace: hipster-backend

replicas: 1

rollingUpdate:
  maxUnavailable: 1
  maxSurge: 1

service:
  port: 9555

resources:
  requests:
    cpu: 200m
    memory: 180Mi
  limits:
    cpu: 300m
    memory: 512Mi

probes:
  initialDelaySeconds: 60
  periodSeconds: 15
  healthPath: "/_healthz"
